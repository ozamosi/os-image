name: ublue main 39
on:
  push:
  schedule:
    - cron: '5 4 * * *'  # 4am-ish UTC everyday (timed against official fedora container pushes)
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: build
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      fedora_version: 39
